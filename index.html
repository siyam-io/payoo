<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo MFS - Login</title>
    <!-- DaisyUI and Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #e0e7ff 100%);
        }
        /* Hide scrollbars globally */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <!-- Premium Bezel-less iPhone Mockup (Scaled 20% larger: 516px x 1030px) -->
    <div class="relative w-[516px] h-[1030px] bg-slate-900 rounded-[60px] p-3.5 shadow-[0_30px_70px_-15px_rgba(0,0,0,0.45)] border border-slate-700/80 flex items-center justify-center">
        <!-- Camera Notch / Dynamic Island -->
        <div class="absolute top-7 left-1/2 -translate-x-1/2 w-36 h-8 bg-slate-900 rounded-full z-50 flex items-center justify-center border border-slate-800">
            <div class="w-3 h-3 bg-slate-950 rounded-full absolute right-5"></div>
        </div>
        
        <!-- Screen Display Area -->
        <div class="w-full h-full bg-slate-50 rounded-[50px] overflow-hidden flex flex-col justify-between relative text-slate-800 p-10 pt-20 no-scrollbar">
            
            <!-- Logo and Branding -->
            <div class="flex flex-col items-center mt-16">
                <div class="w-32 h-32 bg-white p-4.5 rounded-[2.5rem] shadow-xl border border-slate-100/50 flex items-center justify-center mb-8">
                    <img src="./assest/payoo.png" alt="Payoo Logo" class="object-contain" onerror="this.src='https://img.icons8.com/color/96/wallet.png'">
                </div>
                <h1 class="text-5xl font-black text-blue-900 tracking-tight">Payoo</h1>
                <p class="text-lg text-slate-400 font-semibold mt-2">Secure Mobile Wallet</p>
            </div>

            <!-- Login Form (Spacious inputs and buttons) -->
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100/40 mb-10">
                <div class="form-control mb-6">
                    <label class="label pb-2">
                        <span class="label-text font-bold text-slate-700 text-base">Mobile Number</span>
                    </label>
                    <label class="input input-bordered flex items-center gap-2 rounded-2xl bg-slate-50 focus-within:border-blue-600 transition-all h-16">
                        <input type="tel" id="login-phone" class="grow text-lg bg-transparent font-medium" placeholder="Enter 11 digit number" value="01711223344" />
                    </label>
                </div>

                <div class="form-control mb-8">
                    <label class="label pb-2">
                        <span class="label-text font-bold text-slate-700 text-base">4-Digit PIN</span>
                    </label>
                    <label class="input input-bordered flex items-center gap-2 rounded-2xl bg-slate-50 focus-within:border-blue-600 transition-all h-16">
                        <input type="password" id="login-pin" class="grow text-lg bg-transparent font-semibold tracking-wider" placeholder="Enter 4 Digit Pin" maxlength="4" value="1234" />
                    </label>
                </div>

                <button id="btn-login" class="btn btn-primary w-full rounded-2xl bg-blue-700 border-none hover:bg-blue-800 text-white font-extrabold text-lg h-16 shadow-lg shadow-blue-500/20">
                    Login
                </button>
            </div>

            <!-- Hint Section -->
            <div class="text-center pb-6">
                <span class="text-sm text-slate-400 font-semibold">Demo Phone: <strong class="text-slate-600">01711223344</strong> &bull; PIN: <strong class="text-slate-600">1234</strong></span>
            </div>

        </div>
    </div>

    <!-- Script link -->
    <script src="./js/login.js"></script>
</body>
</html>
